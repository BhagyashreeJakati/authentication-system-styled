<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href=76"https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<!--  CSS -->
<link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <header>
        <h1>Simple Authentication System</h1>
        <hr>
    </header>

    <div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow">
    <h3 class="text-center">Login</h3>

    <input type="email" class="form-control mb-3" placeholder="Email">
    <input type="password" class="form-control mb-3" placeholder="Password">

    <button  onclick="loginUser()" class="btn btn-primary w-100">Login</button>
    <p class="text-center mb-1">
                <a href="forgot-password.html">Forgot Password?</a>
            </p>
            <p class="text-center">
                New user? <a href="register.html">Register here</a>
            </p>
  </div>
</div>

    

    <footer>
        <hr>
        <p>&copy; 2026 HTML Authentication POC</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
function loginUser() {

  // Get inputs from card (top inputs)
  let inputs = document.querySelectorAll(".form-control");

  let email = inputs[0].value.trim();
  let password = inputs[1].value;

  

  // Get stored user
  let storedUser = JSON.parse(localStorage.getItem("users"));

  // Validation
  if (email === "" || password === "") {
    alert("Please fill all fields!");
    return;
  }
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let foundUser = users.find(user => user.email === email && user.password === password);

  if (foundUser) {
    // Save the logged-in user session for Dashboard
    localStorage.setItem("user", JSON.stringify(foundUser));


  // if (storedUser && email === storedUser.email && password === storedUser.password) {
    alert("Login successful!");
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid email or password!");
  }
}
</script>

</body>
</html>
