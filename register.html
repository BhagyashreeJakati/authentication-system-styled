<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>


<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 400px;">
    
    <h3 class="text-center mb-3">Register</h3>

    <input type="text" class="form-control mb-3" placeholder="Full Name">
    <input type="email" class="form-control mb-3" placeholder="Email">
    <input type="password" class="form-control mb-3" placeholder="Password">
    <input type="password" class="form-control mb-3" placeholder="Confirm Password">

    <button onclick="registerUser()" class="btn btn-success w-100">Register</button>

    <div class="text-center mt-3">
      <a href="login.html">Already have an account? Login</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function registerUser() {

  // Get all input fields
  let inputs = document.querySelectorAll(".form-control");

  let name = inputs[0].value.trim();
  let email = inputs[1].value.trim();
  let password = inputs[2].value;
  let confirm = inputs[3].value;

  // Empty check
  if (name === "" || email === "" || password === "" || confirm === "") {
    alert("Please fill all fields!");
    return;
  }

  // Password match check
  if (password !== confirm) {
    alert("Passwords do not match!");
    return;
  }

  // Create user object
  let user = {
    name: name,
    email: email,
    password: password
  };

  // Store in localStorage
  let users = JSON.parse(localStorage.getItem("users")) || [];
  if (users.find(u => u.email === email)) {
    alert("This email is already registered! Please login.");
    return;
  }
  users.push(user);
  localStorage.setItem("users", JSON.stringify(users));
  alert("Registration successful!");
  window.location.href = "login.html";
}
</script>

</body>
</html>
