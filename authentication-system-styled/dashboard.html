<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<!-- CSS -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Dashboard</span>
    <button class="btn btn-danger">Logout</button>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
  
  <!-- Welcome Row -->
  <div class="row mb-4">
    <div class="col-12">
      <h2>Welcome User 👋</h2>
      <p class="text-muted">You have successfully logged in.</p>
    </div>
  </div>

  <!-- Cards Row -->
  <div class="row">

    <!-- Card 1 -->
    <div class="col-12 col-md-6 mb-4">
      <div class="card p-3 shadow">
        <h5>Profile</h5>
        <p>View and update your profile details.</p>
        <!--<button onclick="logout()" class="btn btn-primary">Go</button>-->
        <button class="btn btn-primary" disabled>Coming Soon</button>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-12 col-md-6 mb-4">
      <div class="card p-3 shadow">
        <h5>Register User</h5>
        <p>Create a new account.</p>
        <a href="register.html" class="btn btn-success">Register</a>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Get user data
let user = JSON.parse(localStorage.getItem("user"));

// Show username
if (user) {
  document.querySelector("h2").innerText = "Welcome " + user.name + " 👋";
} else {
  // If no user, go back to login
  window.location.href = "index.html";
}

// Logout function
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
