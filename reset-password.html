<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px; border-radius: 15px;">
    
    <h4 class="text-center mb-3">
      <i class="bi bi-lock"></i> Reset Password
    </h4>

    <p class="text-muted text-center">Enter your new password</p>

    <!-- New Password -->
    <input type="password" class="form-control mb-3" placeholder="New Password">

    <!-- Confirm Password -->
    <input type="password" class="form-control mb-3" placeholder="Confirm Password">

    <button onclick="updatePassword()" class="btn btn-success w-100">Update Password</button>

    <div class="text-center mt-3">
      <a href="login.html">Back to Login</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function updatePassword() {

  // Get both password fields
  let inputs = document.querySelectorAll(".form-control");

  let newPassword = inputs[0].value;
  let confirmPassword = inputs[1].value;

  // Validation
  if (newPassword === "" || confirmPassword === "") {
    alert("Please fill all fields!");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("Passwords do not match!");
    return;
  }

  let email = localStorage.getItem("resetEmail");

  if (!email) {
    alert("No email found! Please use the Forgot Password option again.");
    window.location.href = "forgot-password.html";
    return;
  }

  // Get stored users
  let users = JSON.parse(localStorage.getItem("users")) || [];
  // Find the user in the ARRAY and update it
  let userIndex = users.findIndex(u => u.email === email);

  if (userIndex !== -1) {
    users[userIndex].password = newPassword;
    localStorage.setItem("users", JSON.stringify(users));
  
    localStorage.removeItem("resetEmail");

    alert("Password updated successfully!");

    // Redirect to login
    window.location.href = "login.html";
  } else {
    alert("No user found!");
  }
}
</script>

</body>
</html>
